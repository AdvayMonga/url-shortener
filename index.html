<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            color: black;
        }
        
        h1 {
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #000;
            font-size: 14px;
        }
        
        button {
            padding: 10px 20px;
            background: #000;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background: #333;
        }
        
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #000;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .error {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #000;
            display: none;
        }
        
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <h1>URL Shortener</h1>
    <p>Enter a long URL and optionally choose a custom short code. Links expire in 7 days.</p>
    
    <form id="shortenForm">
        <input 
            type="url" 
            id="url" 
            placeholder="Enter long URL" 
            required
        >
        
        <input 
            type="text" 
            id="customCode" 
            placeholder="Custom code (optional, 3-20 characters)"
        >
        
        <button type="submit">Shorten</button>
    </form>
    
    <div class="error" id="error"></div>
    
    <div class="result" id="result">
        <strong>Your short URL:</strong><br>
        <input type="text" id="shortUrl" readonly>
        <button onclick="copyToClipboard()">Copy</button>
    </div>
    
    <script>
        const form = document.getElementById('shortenForm');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const shortUrlInput = document.getElementById('shortUrl');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Hide previous results
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');
            
            const url = document.getElementById('url').value;
            const customCode = document.getElementById('customCode').value;
            
            const payload = { url };
            if (customCode) {
                payload.custom_code = customCode;
            }
            
            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText);
                }
                
                const data = await response.json();
                shortUrlInput.value = data.short_url;
                resultDiv.classList.add('show');
                
                // Clear form
                document.getElementById('url').value = '';
                document.getElementById('customCode').value = '';
                
            } catch (error) {
                errorDiv.textContent = error.message || 'Error creating short URL';
                errorDiv.classList.add('show');
            }
        });
        
        function copyToClipboard() {
            shortUrlInput.select();
            document.execCommand('copy');
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        }
    </script>
</body>
</html>
